name: chess_trainer
description: Chess openings trainer for Android and web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  chess: ^0.8.1
  flutter_riverpod: ^2.5.1
  collection: ^1.18.0
  stockfish: ^1.8.1
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/openings/openings.json
    - assets/pieces/
